<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
    <linearGradient id="bookShade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="350" cy="55" r="75" fill="rgba(255,255,255,0.05)"/>
  <circle cx="45" cy="255" r="65" fill="rgba(255,255,255,0.04)"/>
  <circle cx="370" cy="230" r="45" fill="rgba(255,255,255,0.03)"/>

  <!-- Decorative lines -->
  <line x1="30" y1="30" x2="95" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <line x1="30" y1="38" x2="68" y2="38" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
  <line x1="305" y1="270" x2="370" y2="270" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <line x1="330" y1="262" x2="370" y2="262" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <!-- Book icon -->
  <rect x="160" y="65" width="80" height="100" rx="3" fill="url(#bookShade)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="200" y1="65" x2="200" y2="165" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Page lines left -->
  <line x1="172" y1="85" x2="194" y2="85" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="172" y1="95" x2="194" y2="95" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="172" y1="105" x2="194" y2="105" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="172" y1="115" x2="190" y2="115" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="172" y1="125" x2="194" y2="125" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="172" y1="135" x2="188" y2="135" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Page lines right -->
  <line x1="206" y1="85" x2="228" y2="85" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="206" y1="95" x2="228" y2="95" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="206" y1="105" x2="228" y2="105" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="206" y1="115" x2="224" y2="115" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="206" y1="125" x2="228" y2="125" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="206" y1="135" x2="220" y2="135" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Book spine shadow -->
  <rect x="158" y="67" width="4" height="96" rx="1" fill="rgba(0,0,0,0.15)"/>

  <!-- Title text (two lines) -->
  <text x="200" y="200" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">Analisi</text>
  <text x="200" y="224" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">Matematica 1</text>

  <!-- Subtitle line -->
  <line x1="135" y1="234" x2="265" y2="234" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Category label -->
  <text x="200" y="250" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">INGEGNERIA</text>

  <!-- UniPass watermark -->
  <text x="200" y="280" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="3">UniPass</text>
</svg>